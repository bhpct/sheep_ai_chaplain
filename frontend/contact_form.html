<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>與關懷師取得聯繫</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3748;
        }

        body { 
            background: var(--primary-bg); 
            background-attachment: fixed;
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
        }

        .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="common/miemie_sheep.jpg" alt="咩咪羊" class="avatar-img">
    <h4 class="fw-bold mb-3 text-success">我們想聽聽您的聲音</h4>
    <p class="text-muted mb-4 small" style="line-height: 1.6;">
        為確保您的安全，並提供最即時的關懷，想請您留下聯絡電話。<br>
        <span class="text-danger fw-bold"><i class="fa-solid fa-lock"></i> 您的資訊絕對保密，僅供醫療關懷使用。</span>
    </p>

    <form id="contactForm" onsubmit="submitContact(event)">
        <div class="mb-4 text-start">
            <label class="form-label fw-bold text-dark ms-2"><i class="fa-solid fa-phone text-primary"></i> 聯絡電話</label>
            <input type="tel" class="form-control form-control-lg rounded-pill px-4" id="phoneInput" placeholder="例如：0912345678" required pattern="[0-9]{8,15}">
        </div>
        
        <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm fw-bold" id="submitBtn">
            <i class="fa-solid fa-paper-plane"></i> 送出聯絡方式
        </button>
    </form>
    
    <div id="successMsg" style="display: none;">
        <i class="fa-solid fa-circle-check fa-4x text-success mb-3 mt-4"></i>
        <h5 class="fw-bold text-dark">已收到您的聯絡方式</h5>
        <p class="text-muted small mb-0">關懷師會盡快與您聯繫，謝謝您願意讓我們陪伴。</p>
        <button class="btn btn-outline-secondary rounded-pill mt-4 w-100" onclick="liff.closeWindow()">關閉視窗</button>
    </div>
</div>

<!-- LINE LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    let liffId = '';
    const urlParams = new URLSearchParams(window.location.search);
    const caseId = urlParams.get('caseId');

    async function init() {
        try {
            const res = await fetch('/api/config');
            const config = await res.json();
            liffId = config.liffId;
            if(liffId) {
                await liff.init({ liffId });
            }
        } catch(e) {
            console.error("LIFF 載入失敗", e);
        }
    }
    
    init();

    async function submitContact(e) {
        e.preventDefault();
        if(!caseId) {
            alert('無效的案件編號，請從 LINE 訊息重新進入！');
            return;
        }

        const phone = document.getElementById('phoneInput').value.trim();
        const btn = document.getElementById('submitBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 傳送中...';

        try {
            const res = await fetch(`/api/patient/cases/${caseId}/contact`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('contactForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } else {
                alert('發生錯誤：' + data.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 送出聯絡方式';
            }
        } catch(err) {
            alert('網路錯誤，請稍後再試。');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 送出聯絡方式';
        }
    }
</script>
</body>
</html>
