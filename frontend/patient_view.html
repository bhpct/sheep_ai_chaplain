<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對講機 - 咩咪羊關懷師</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 加入 FontAwesome 星星圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common/style.css">
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none; /* 防止滑動或縮放 */
            overscroll-behavior-y: none; /* 防止下拉更新 */
        }
        
        .mic-button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
        }

        #recordButton {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        #recordButton i {
            font-size: 3rem;
        }

        #recordButton:active {
            transform: scale(0.9);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
        }
    </style>
    <!-- 加入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // LIFF 轉址攔截器 (攔截 LINE 推播過來的連結)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'contact') {
            const cId = urlParams.get('caseId');
            window.location.href = 'contact_form.html?caseId=' + cId;
        }
    </script>
</head>
<body>
    <div class="container mt-5 text-center" style="max-width: 600px;">
        <h2 class="mb-3">🐑 咩咪羊 聽你說心事</h2>
        <div class="badge bg-secondary mb-4 p-2" id="hosp-welcome">載入中...</div>
        
        <div class="mt-2 mb-4">
            <!-- 咩咪羊大頭貼 -->
            <img src="common/miemie_sheep.jpg" alt="咩咪羊關懷師" class="sheep-head img-fluid" id="sheepAvatar">
        </div>
        
        <!-- 對話氣泡區塊 -->
        <div class="chat-bubble-container mb-4">
            <div id="chatBubble" class="chat-bubble shadow-sm">
                嗨，平安！我是咩咪羊。今天過得好嗎？想跟我說說話嗎？
            </div>
            <!-- 動態互動元件區 (星星動畫) -->
            <div id="interactiveWidget" class="mt-3" style="display: none;">
                <p class="text-muted small mb-2">點擊星星來告訴我吧：</p>
                <!-- 使用 flex-row-reverse 達成 Hover 時連動點亮前面的星星效果 -->
                <div class="stars-container d-flex justify-content-center flex-row-reverse">
                    <button class="star-btn" data-val="5"><i class="fa-solid fa-star"></i></button>
                    <button class="star-btn" data-val="4"><i class="fa-solid fa-star"></i></button>
                    <button class="star-btn" data-val="3"><i class="fa-solid fa-star"></i></button>
                    <button class="star-btn" data-val="2"><i class="fa-solid fa-star"></i></button>
                    <button class="star-btn" data-val="1"><i class="fa-solid fa-star"></i></button>
                </div>
            </div>
        </div>

        <div class="mic-button-wrapper pb-5">
            <button id="recordButton" class="btn btn-danger shadow walkie-talkie-btn">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <h5 id="recordStatusText" class="text-muted mt-4 fw-bold">按住螢幕說話</h5>
            <p class="text-muted mt-1 small">請允許麥克風權限後，長按按鈕即可錄音</p>
        </div>
    </div>

    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 載入錄音邏輯 -->
    <script src="common/recorder.js?v=9"></script>
</body>
</html>
